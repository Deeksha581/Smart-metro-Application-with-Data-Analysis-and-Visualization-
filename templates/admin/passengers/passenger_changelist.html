<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% extends "admin/change_list.html" %}
{% load static %}

{% block content %}

<h2>📊 Passenger Analytics – Most Traveled Routes</h2>

<canvas id="routeChart" width="600" height="300"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const labels = {{ route_labels|safe }};
const values = {{ route_values|safe }};

new Chart(document.getElementById('routeChart'), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Passenger Count',
            data: values,
            backgroundColor: 'rgba(54, 162, 235, 0.6)'
        }]
    }
});
</script>

<hr>

{{ block.super }}

{% endblock %}

</body>
</html>

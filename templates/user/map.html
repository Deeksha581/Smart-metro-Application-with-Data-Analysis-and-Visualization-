{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bangalore Metro Live Map</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
}

/* BACKGROUND IMAGE USING IMG TAG */
.bg-container {
    position: relative;
    min-height: 100vh;

    /* ✅ CENTER CONTENT */
    display: flex;
    align-items: center;      /* vertical center */
    justify-content: center;  /* horizontal center */

    overflow: hidden;
    padding: 20px;
}


.bg-container img.bg-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* DARK OVERLAY */
.bg-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: -1;
}

/* MAIN CARD */
.main-card {
    background: rgba(255,255,255,0.96);
    border-radius: 22px;
    padding: 40px;
    max-width: 1000px;
    width: 100%;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
}


/* STATIONS */
.station {
    padding: 10px 15px;
    border-bottom: 1px dashed #ccc;
}

.active {
    background: #ede7f6;
    font-weight: bold;
    border-radius: 6px;
}

.progress-container {
    display: none;
    margin-top: 25px;
}
</style>
</head>

<body>

<div class="bg-container">

    <!-- BACKGROUND IMAGE -->
    <img src="/static/images/img1.jpg" class="bg-img" alt="Metro Background">
    <div class="bg-overlay"></div>

    <!-- CONTENT -->
    <div class="main-card">

        <div class="text-center mb-4">
            <h1>🚇 Bangalore Metro Live Map</h1>
            <p class="text-muted">
                Live metro route tracking using Bangalore Metro station data (Simulated)
            </p>
        </div>

        <!-- LINE SELECT -->
        <div class="row g-3">
            <div class="col-md-6">
                <label class="fw-bold">Select Metro Line</label>
                <select id="line" class="form-select" onchange="loadStations()">
                    <option value="purple">Purple Line</option>
                    <option value="green">Green Line</option>
                    <option value="yellow">Yellow Line</option>
                    <option value="blue">Blue Line</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="fw-bold">Destination Station</label>
                <select id="destination" class="form-select"></select>
            </div>
        </div>

        <!-- BUTTON -->
        <div class="text-center mt-4">
            <button onclick="startTracking()" class="btn btn-primary btn-lg px-5">
                ▶ Track Metro
            </button>
        </div>

        <!-- LIVE TRACKING -->
        <div class="progress-container" id="trackingBox">
            <h5 class="mt-4">📍 Live Metro Status</h5>
            <div id="stations"></div>
        </div>

        <!-- BACK -->
        <div class="text-center mt-4">
            <a href="{% url 'accounts:user_dashboard' %}"
               class="btn btn-outline-dark btn-lg fw-bold px-5">
                ⬅ Back to Travel Guide Dashboard
            </a>
        </div>

    </div>
</div>

<script>
const metroLines = {
    purple: [
        "Whitefield (Kadugodi)",
        "KR Puram",
        "Baiyappanahalli",
        "Indiranagar",
        "MG Road",
        "Majestic (Kempegowda)",
        "Vijayanagara",
        "Kengeri",
        "Challaghatta"
    ],
    green: [
        "Madavara",
        "Nagasandra",
        "Yeshwanthpura",
        "Majestic (Kempegowda)",
        "Chickpet",
        "Krishna Rajendra Market",
        "Lalbagh",
        "Banashankari",
        "Jayanagar",
        "RV Road",
        "Konanakunte Cross",
        "Thalaghattapura",
        "Silk Institute"
    ],
    yellow: [
        "RV Road",
        "Ragigudda",
        "Jayadeva Hospital",
        "BTM Layout",
        "Central Silk Board",
        "Bommanahalli",
        "Electronic City",
        "Konappana Agrahara",
        "Bommasandra"
    ],
    blue: [
        "Central Silk Board",
        "Bommanahalli",
        "Hongasandra",
        "Kudlu Gate",
        "Singasandra",
        "Hosa Road",
        "Beratena Agrahara",
        "Electronic City",
        "Infosys Foundation Konappana Agrahara",
        "Huskur Road",
        "Biocon Hebbagodi",
        "Delta Electronics Bommasandra",
        "KR Puram",
        "Nagavara"
    ]
};

let currentRoute = [];
let index = 0;
let interval;

function loadStations() {
    const line = document.getElementById("line").value;
    const dest = document.getElementById("destination");
    dest.innerHTML = "";
    metroLines[line].forEach(st => {
        const o = document.createElement("option");
        o.textContent = st;
        dest.appendChild(o);
    });
}
loadStations();

function startTracking() {
    currentRoute = metroLines[document.getElementById("line").value];
    document.getElementById("trackingBox").style.display = "block";
    index = 0;
    renderStations();
    clearInterval(interval);
    interval = setInterval(() => {
        if (index < currentRoute.length - 1) {
            index++;
            renderStations();
        }
    }, 2000);
}

function renderStations() {
    let html = "";
    currentRoute.forEach((s, i) => {
        html += `<div class="station ${i===index?'active':''}">
                    ${i===index?'🚆':'○'} ${s}
                 </div>`;
    });
    document.getElementById("stations").innerHTML = html;
}
</script>

</body>
</html>

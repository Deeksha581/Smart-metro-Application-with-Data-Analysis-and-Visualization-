<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account | Namma Metro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at 10% 20%, #1e3a8a 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, #020617 0%, transparent 40%),
                #0f172a;
        }

        .register-card {
            background: #ffffff;
            width: 400px;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        .register-card h2 {
            margin-bottom: 8px;
            font-weight: 600;
        }

        .register-card p {
            font-size: 14px;
            color: #555;
            margin-bottom: 25px;
        }

        .register-card input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .register-card button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .register-card button:hover {
            background: #1d4ed8;
        }

        .links {
            margin-top: 18px;
            font-size: 14px;
        }

        .links a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="register-card">
    <h2>📝 Create Account</h2>
    <p>Register to access Namma Metro services</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <input type="text" name="full_name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>

        <button type="submit">Register</button>
    </form>

    <div class="links">
        <p>
            Already have an account?
            <a href="{% url 'accounts:login' %}">Back to Login</a>
        </p>
    </div>
</div>

</body>
</html>

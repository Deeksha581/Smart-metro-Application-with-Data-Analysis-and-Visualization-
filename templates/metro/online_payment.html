<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Payment | Bangalore Metro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6fb;
        }

        .card-box {
            background: white;
            border-radius: 22px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            max-width: 950px;
            margin: auto;
        }

        select, input, button {
            border-radius: 30px !important;
        }

        .success-box {
            display: none;
            text-align: center;
            padding: 30px;
            background: #e8f5e9;
            border-radius: 20px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="container my-5">
    <div class="card-box">

        <h2>📱 Online Payment (UPI / Card)</h2>
        <p class="text-muted">

        </p>

        <!-- PAYMENT FORM -->
        <div id="paymentForm">

            <label class="fw-bold mt-3">Amount (₹)</label>
            <input type="number" id="amount" class="form-control" value="40">

            <!-- METRO LINE -->
            <label class="fw-bold mt-3">Select Metro Line</label>
            <select id="line" class="form-select" onchange="updateStations()">
                <option value="">Select Line</option>
                <option value="purple">Purple Line</option>
                <option value="green">Green Line</option>
                <option value="blue">Blue Line (Airport)</option>
            </select>

            <!-- SOURCE -->
            <label class="fw-bold mt-3">Source Station</label>
            <select id="source" class="form-select">
                <option value="">Select Source</option>
            </select>

            <!-- DESTINATION -->
            <label class="fw-bold mt-3">Destination Station</label>
            <select id="destination" class="form-select">
                <option value="">Select Destination</option>
            </select>

            <button class="btn btn-primary btn-lg w-100 mt-4" onclick="showPaymentOptions()">
                Pay Now
            </button>
        </div>

        <!-- PAYMENT OPTIONS -->
        <div id="paymentOptions" style="display:none">

            <h4 class="mt-4">Select Payment Method</h4>

            <select class="form-select mt-2">
                <option>Google Pay (UPI)</option>
                <option>PhonePe (UPI)</option>
                <option>Paytm (UPI)</option>
                <option>Debit Card</option>
                <option>Credit Card</option>
            </select>

            <div class="mt-3">
                <label class="fw-bold">UPI ID / Card Number</label>
                <input type="text" class="form-control"
                       placeholder="example@upi / 1234-5678-9012">
            </div>

            <button class="btn btn-success btn-lg w-100 mt-4" onclick="paymentSuccess()">
                Confirm Payment
            </button>
        </div>

        <!-- SUCCESS -->
        <div class="success-box" id="successBox">
            <h2 class="text-success">✅ Payment Successful</h2>
            <p>Your Bangalore Metro ticket payment was completed successfully.</p>
            <p class="text-muted"></p>

            <a href="/metro/payment/" class="btn btn-primary mt-3">
                Back to Payments
            </a>
        </div>

        <p class="text-muted mt-4">

        </p>

    </div>
</div>

<script>
const stations = {
    purple: [
        "Whitefield",
        "Hopefarm",
        "KR Puram",
        "Baiyappanahalli",
        "Indiranagar",
        "MG Road",
        "Majestic",
        "Vijayanagar",
        "Kengeri"
    ],
    green: [
        "Nagasandra",
        "Dasarahalli",
        "Yeshwanthpur",
        "Rajajinagar",
        "Majestic",
        "Chickpet",
        "Lalbagh",
        "Yelachenahalli"
    ],
    blue: [
        "Kempegowda Airport",
        "Hebbal",
        "Yelahanka",
        "KR Puram",
        "Baiyappanahalli",
        "Indiranagar"
    ]
};

function updateStations() {
    const line = document.getElementById("line").value;
    const source = document.getElementById("source");
    const destination = document.getElementById("destination");

    source.innerHTML = '<option value="">Select Source</option>';
    destination.innerHTML = '<option value="">Select Destination</option>';

    if (!line) return;

    stations[line].forEach(station => {
        source.innerHTML += `<option>${station}</option>`;
        destination.innerHTML += `<option>${station}</option>`;
    });
}

function showPaymentOptions() {
    if (!line.value || !source.value || !destination.value) {
        alert("Please select metro line, source and destination");
        return;
    }
    document.getElementById("paymentForm").style.display = "none";
    document.getElementById("paymentOptions").style.display = "block";
}

function paymentSuccess() {
    document.getElementById("paymentOptions").style.display = "none";
    document.getElementById("successBox").style.display = "block";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bangalore Metro Fare Check</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #eef2f7; }
        .hero {
            background: linear-gradient(135deg, #512da8, #673ab7);
            color: white;
            padding: 70px 20px;
            text-align: center;
        }
        .card-box {
            background: white;
            border-radius: 22px;
            padding: 40px;
            margin-top: -55px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.15);
        }
        .fare-box {
            display: none;
            background: #ede7f6;
            padding: 25px;
            border-radius: 18px;
            margin-top: 30px;
        }
        .fare {
            font-size: 44px;
            font-weight: 700;
            color: #1b5e20;
        }
        select, button { border-radius: 30px !important; }
    </style>
</head>

<body>

<div class="hero">
    <h1>🚇 Bangalore Metro Fare Calculator</h1>
    <p>Line-wise & Station-wise Fare (Demo)</p>
</div>

<div class="container">
<div class="card-box">

<div class="alert alert-secondary">
<strong>Rules</strong>
<ul class="mb-0">
<li>Scan token/card at entry & exit</li>
<li>Do not lose token</li>
<li>Fare depends on stations & metro line</li>
</ul>
</div>

<div class="row g-3">
<div class="col-md-4">
<label class="fw-bold">Metro Line</label>
<select id="line" class="form-select" onchange="loadStations()">
<option value="">Select Line</option>
<option value="purple">Purple Line</option>
<option value="green">Green Line</option>
<option value="blue">Blue Line (Airport)</option>
<option value="yellow">Yellow Line</option>
</select>
</div>

<div class="col-md-4">
<label class="fw-bold">Source</label>
<select id="source" class="form-select"></select>
</div>

<div class="col-md-4">
<label class="fw-bold">Destination</label>
<select id="destination" class="form-select"></select>
</div>

<div class="col-md-12 mt-3">
<button class="btn btn-primary w-100" onclick="calculateFare()">Check Fare</button>
</div>
</div>

<div id="fareBox" class="fare-box">
<p>
<strong>Line:</strong> <span id="lineText"></span><br>
<strong>From:</strong> <span id="fromText"></span><br>
<strong>To:</strong> <span id="toText"></span>
</p>
<div class="fare">₹ <span id="fareAmount"></span></div>
<p class="text-muted"></p>
</div>

<a href="/metro/payment/" class="d-block mt-4">← Back to Payments</a>

</div>
</div>

<script>
const metroLines = {

purple: {
name: "Purple Line",
stations: [
"Whitefield","Hopefarm","KR Puram","Baiyappanahalli","Indiranagar",
"MG Road","Cubbon Park","Majestic","Vijayanagar","Mysore Road"
],
fares: {
"Whitefield-Majestic": 55,
"Whitefield-MG Road": 45,
"Whitefield-Indiranagar": 40,
"Whitefield-Mysore Road": 65,
"KR Puram-Majestic": 50,
"KR Puram-MG Road": 40,
"Baiyappanahalli-Indiranagar": 25,
"Indiranagar-Majestic": 35,
"MG Road-Majestic": 20,
"Majestic-Mysore Road": 40,
"Vijayanagar-MG Road": 30
}
},

green: {
name: "Green Line",
stations: [
"Nagasandra","Dasarahalli","Yeshwanthpur","Rajajinagar",
"Majestic","Chickpet","Lalbagh","Jayanagar","Banashankari","Yelachenahalli"
],
fares: {
"Nagasandra-Majestic": 55,
"Nagasandra-Lalbagh": 65,
"Yeshwanthpur-Majestic": 40,
"Rajajinagar-Majestic": 30,
"Majestic-Jayanagar": 45,
"Majestic-Yelachenahalli": 60,
"Lalbagh-Banashankari": 25,
"Jayanagar-Yelachenahalli": 35
}
},

blue: {
name: "Blue Line (Airport)",
stations: [
"KR Puram","Hebbal","Yelahanka","Devanahalli","Airport T1","Airport T2"
],
fares: {
"KR Puram-Airport T1": 80,
"KR Puram-Airport T2": 90,
"Hebbal-Airport T1": 70,
"Hebbal-Airport T2": 80,
"Yelahanka-Airport T1": 60,
"Devanahalli-Airport T2": 40
}
},

yellow: {
name: "Yellow Line",
stations: [
"RV Road","BTM Layout","Silk Board","HSR Layout",
"Bommanahalli","Electronic City Phase 1","Electronic City Phase 2"
],
fares: {
"RV Road-Silk Board": 30,
"RV Road-HSR Layout": 35,
"BTM Layout-HSR Layout": 25,
"BTM Layout-Electronic City Phase 1": 45,
"HSR Layout-Electronic City Phase 1": 40,
"Electronic City Phase 1-Phase 2": 20
}
}

};

function loadStations() {
const line = document.getElementById("line").value;
const src = document.getElementById("source");
const dest = document.getElementById("destination");
src.innerHTML = `<option value="">Select Source</option>`;
dest.innerHTML = `<option value="">Select Destination</option>`;
if (!line) return;
metroLines[line].stations.forEach(s => {
src.innerHTML += `<option>${s}</option>`;
dest.innerHTML += `<option>${s}</option>`;
});
}

function calculateFare() {
const lineKey = document.getElementById("line").value;
const s = document.getElementById("source").value;
const d = document.getElementById("destination").value;
if (!lineKey || !s || !d) { alert("Select all fields"); return; }
if (s === d) { alert("Source & destination cannot be same"); return; }

const fares = metroLines[lineKey].fares;
const key1 = `${s}-${d}`;
const key2 = `${d}-${s}`;
const fare = fares[key1] || fares[key2] || 40;

document.getElementById("lineText").innerText = metroLines[lineKey].name;
document.getElementById("fromText").innerText = s;
document.getElementById("toText").innerText = d;
document.getElementById("fareAmount").innerText = fare;
document.getElementById("fareBox").style.display = "block";
}
</script>

</body>
</html>

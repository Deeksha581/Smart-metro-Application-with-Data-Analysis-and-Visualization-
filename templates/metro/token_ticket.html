<!DOCTYPE html>
<html>
<head>
    <title>Buy Token Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="card p-4 shadow">
        <h3>🎫 Buy Token Ticket</h3>

        <ul>
            <li>Scan token at entry & exit gate</li>
            <li>Do not lose token</li>
            <li>Keep token safe till destination</li>
        </ul>

        <form method="post">
            {% csrf_token %}

            <label>Source</label>
            <select name="source" class="form-select mb-3" required>
                <option>Majestic</option>
                <option>MG Road</option>
                <option>Indiranagar</option>
            </select>

            <label>Destination</label>
            <select name="destination" class="form-select mb-3" required>
                <option>MG Road</option>
                <option>Whitefield</option>
                <option>Majestic</option>
            </select>

            <label>Pay App</label>
            <select name="pay_app" class="form-select mb-3">
                <option value="gpay">Google Pay</option>
                <option value="phonepe">PhonePe</option>
                <option value="paytm">Paytm</option>
            </select>

            <button class="btn btn-success w-100">
                Proceed to Pay
            </button>
        </form>
    </div>
</div>

</body>
</html>

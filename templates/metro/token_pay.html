<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting to Payment</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6fb;
            font-family: Arial, sans-serif;
        }

        .box {
            max-width: 500px;
            margin: 120px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 6px solid #ddd;
            border-top: 6px solid #0d6efd;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="box">
    <h3 class="text-success">Redirecting to Payment</h3>

    <p>
        <strong>From:</strong> {{ source }} <br>
        <strong>To:</strong> {{ destination }} <br>
        <strong>Fare:</strong> ₹{{ fare }}
    </p>

    <div class="loader"></div>

    <p class="text-muted">
        Opening your UPI app (Google Pay / PhonePe / Paytm)
    </p>

    <p class="text-danger small">
        If redirection does not happen, please allow popups or open your UPI app manually.
    </p>
</div>

<script>
    const fare = "{{ fare }}";
    const payApp = "{{ pay_app }}";

    let upiUrl = "";

    if (payApp === "gpay") {
        upiUrl = "upi://pay?pa=demo@upi&pn=NammaMetro&am=" + fare;
    }
    else if (payApp === "phonepe") {
        upiUrl = "upi://pay?pa=demo@upi&pn=NammaMetro&am=" + fare;
    }
    else if (payApp === "paytm") {
        upiUrl = "upi://pay?pa=demo@upi&pn=NammaMetro&am=" + fare;
    }

    // Client-side redirect (SAFE)
    setTimeout(function () {
        window.location.href = upiUrl;
    }, 2000);
</script>

</body>
</html>

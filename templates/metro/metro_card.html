<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metro Smart Card | Bangalore Metro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6fb;
        }

        .hero {
            background: linear-gradient(135deg, #00695c, #26a69a);
            color: white;
            padding: 70px 20px;
            text-align: center;
        }

        .card-box {
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            margin-top: -50px;
        }

        .balance {
            font-size: 32px;
            font-weight: 700;
            color: #2e7d32;
        }

        .fare-box {
            display: none;
            background: #e8f5e9;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        select, button, input {
            border-radius: 30px !important;
        }
    </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>💳 Metro Smart Card</h1>
    <p>Recharge, check balance & calculate fare</p>
</div>

<div class="container">
    <div class="card-box">

        <!-- CARD DETAILS -->
        <div class="row mb-4">
            <div class="col-md-6">
                <h5>Card Details</h5>
                <p><strong>User Email:</strong> {{ request.user.email }}</p>
                <p class="text-danger">
                    First-time card must be collected at metro counter.
                </p>
            </div>

            <div class="col-md-6">
                <h5>Recharge</h5>
                <input type="number" id="rechargeAmount" class="form-control mb-3"
                       placeholder="Enter recharge amount">
                <button class="btn btn-success w-100" onclick="rechargeCard()">
                    Recharge
                </button>
                <small class="text-muted d-block mt-2">

                </small>
            </div>
        </div>

        <hr>

        <!-- FARE CHECK -->
        <h5 class="mb-3">🚇 Check Fare (Source → Destination)</h5>

        <!-- LINE SELECT -->
        <div class="mb-3">
            <label class="fw-bold">Metro Line</label>
            <select id="line" class="form-select" onchange="updateStations()">
                <option value="">Select Line</option>
                <option value="purple">Purple Line</option>
                <option value="green">Green Line</option>
                <option value="blue">Blue Line (Airport)</option>
            </select>
        </div>

        <div class="row g-3">
            <div class="col-md-5">
                <label class="fw-bold">Source Station</label>
                <select id="source" class="form-select"></select>
            </div>

            <div class="col-md-5">
                <label class="fw-bold">Destination Station</label>
                <select id="destination" class="form-select"></select>
            </div>

            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="calculateFare()">
                    Check
                </button>
            </div>
        </div>

        <!-- RESULT -->
        <div id="fareBox" class="fare-box">
            <p>
                <strong>From:</strong> <span id="fromStation"></span><br>
                <strong>To:</strong> <span id="toStation"></span>
            </p>
            <p class="balance">₹ <span id="fareAmount"></span></p>
            <p class="text-muted">
                Fare calculated based on station distance
            </p>
        </div>

        <a href="/metro/payment/" class="d-block mt-4">
            ← Back to Payments
        </a>

    </div>
</div>

<!-- JS -->
<script>
/* STATIONS WITH DISTANCE INDEX */
const metroData = {
    purple: [
        ["Whitefield", 0],
        ["Hopefarm", 1],
        ["Kadugodi", 2],
        ["KR Puram", 3],
        ["Baiyappanahalli", 4],
        ["Indiranagar", 5],
        ["Halasuru", 6],
        ["MG Road", 7],
        ["Cubbon Park", 8],
        ["Majestic", 9],
        ["Vijayanagar", 10],
        ["Kengeri", 11]
    ],
    green: [
        ["Nagasandra", 0],
        ["Dasarahalli", 1],
        ["Yeshwanthpur", 2],
        ["Rajajinagar", 3],
        ["Mahakavi Kuvempu Road", 4],
        ["Majestic", 5],
        ["Chickpet", 6],
        ["KR Market", 7],
        ["Lalbagh", 8],
        ["Banashankari", 9],
        ["Yelachenahalli", 10]
    ],
    blue: [
        ["KR Puram", 0],
        ["Nagawara", 1],
        ["Hebbal", 2],
        ["Yelahanka", 3],
        ["Airport Terminal", 4]
    ]
};

function updateStations() {
    const line = document.getElementById("line").value;
    const source = document.getElementById("source");
    const destination = document.getElementById("destination");

    source.innerHTML = `<option value="">Select Source</option>`;
    destination.innerHTML = `<option value="">Select Destination</option>`;

    if (!line) return;

    metroData[line].forEach(st => {
        source.innerHTML += `<option value="${st[1]}">${st[0]}</option>`;
        destination.innerHTML += `<option value="${st[1]}">${st[0]}</option>`;
    });
}

function rechargeCard() {
    const amt = document.getElementById("rechargeAmount").value;
    if (!amt || amt <= 0) {
        alert("Enter valid amount");
        return;
    }
    alert("Recharge successful (Demo): ₹" + amt);
    document.getElementById("rechargeAmount").value = "";
}

function calculateFare() {
    const srcIndex = document.getElementById("source").value;
    const destIndex = document.getElementById("destination").value;
    const line = document.getElementById("line").value;

    if (!srcIndex || !destIndex || !line) {
        alert("Please select line, source and destination");
        return;
    }

    if (srcIndex === destIndex) {
        alert("Source and destination cannot be same");
        return;
    }

    const stations = metroData[line];
    const distance = Math.abs(srcIndex - destIndex);

    /* Fare formula */
    const fare = 20 + (distance * 8);

    document.getElementById("fromStation").innerText =
        stations[srcIndex][0];
    document.getElementById("toStation").innerText =
        stations[destIndex][0];
    document.getElementById("fareAmount").innerText = fare;

    document.getElementById("fareBox").style.display = "block";
}
</script>

</body>
</html>
